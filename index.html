            color: #475569;
            font-size: 0.75rem;

            letter-spacing: 0.3px;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
        }

            color: #1e293b;
        }

            display: inline-block;

            font-weight: 600;
            font-size: 0.75rem;
            text-align: center;

            function getBadgeClass(grade) {
                if (!grade || grade === "-") return "other";
                if (grade === "A+") return "a-plus";
                if (grade === "A") return "a";
                if (grade === "A-") return "a-minus";
                if (grade === "B+") return "b-plus";
                if (grade === "B") return "b";
                return "other";
            }

            function renderTable(data) {
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px;color:#64748b;">没有匹配的结果</td></tr>`;
                    recordCount.textContent = "0 条记录";
                    return;
                }
                let html = "";
                data.forEach(row => {
                    const [province, school, subject, round4, round5] = row;
                    html += `<tr>
                        <td><span class="province-badge">${escapeHtml(province)}</span></td>
                        <td class="school-name">${escapeHtml(school)}</td>
                        <td>${escapeHtml(subject)}</td>
                        <td><span class="badge ${getBadgeClass(round4)}">${escapeHtml(round4)}</span></td>
                        <td><span class="badge ${getBadgeClass(round5)}">${escapeHtml(round5)}</span></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
                recordCount.textContent = `${data.length} 条记录`;
            }

            function escapeHtml(str) {
                return String(str).replace(/[&<>"]/g, function(m) {
                    if (m === "&") return "&amp;";
                    if (m === "<") return "&lt;";
                    if (m === ">") return "&gt;";
                    if (m === '"') return "&quot;";
                    return m;
                });
            }

            function filterAndSearch() {
                let filtered = [...rawData];
                if (currentFilter !== "all") {
                    filtered = filtered.filter(row => row[4] === currentFilter);
                }
                if (currentSearch.trim() !== "") {
                    const term = currentSearch.trim().toLowerCase();
                    filtered = filtered.filter(row => 
                        row[0].toLowerCase().includes(term) ||
                        row[1].toLowerCase().includes(term) ||
                        row[2].toLowerCase().includes(term)
                    );
                }
                renderTable(filtered);
            }

            searchBtn.addEventListener("click", () => {
                currentSearch = searchInput.value;
                filterAndSearch();
            });
            searchInput.addEventListener("keyup", (e) => {
                if (e.key === "Enter") {
                    currentSearch = searchInput.value;
                    filterAndSearch();
                }
            });

            filterChips.forEach(chip => {
                chip.addEventListener("click", () => {
                    filterChips.forEach(c => c.classList.remove("active"));
                    chip.classList.add("active");
                    currentFilter = chip.dataset.grade;
                    filterAndSearch();
                });
            });
