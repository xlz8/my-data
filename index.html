            // 初始化下拉选项
            function initSelects() {
                // 提取所有学科门类
                const categories = new Set();
                rawData.forEach(row => {
                    const subject = row[2];
                    const cat = subjectCategoryMap[subject] || "其他";
                    categories.add(cat);
                });
                const sortedCategories = Array.from(categories).sort();
                sortedCategories.forEach(cat => {
                    const option = document.createElement("option");
                    option.value = cat;
                    option.textContent = cat;
                    categorySelect.appendChild(option);
                });

                // 提取所有省份
                const provinces = new Set();
                rawData.forEach(row => provinces.add(row[0]));
                const sortedProvinces = Array.from(provinces).sort();
                sortedProvinces.forEach(prov => {
                    const option = document.createElement("option");
                    option.value = prov;
                    option.textContent = prov;
                    provinceSelect.appendChild(option);
                });
            }

            function getBadgeClass(grade) {
                if (!grade || grade === "-") return "other";
                if (grade === "A+") return "a-plus";
                if (grade === "A") return "a";
                if (grade === "A-") return "a-minus";
                if (grade === "B+") return "b-plus";
                if (grade === "B") return "b";
                return "other";
            }

            function renderTable(data) {
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px;color:#64748b;">没有匹配的结果</td></tr>`;
                    recordCount.textContent = "0 条记录";
                    return;
                }
                let html = "";
                data.forEach(row => {
                    const [province, school, subject, round4, round5] = row;
                    html += `<tr>
                        <td><span class="province-badge">${escapeHtml(province)}</span></td>
                        <td class="school-name">${escapeHtml(school)}</td>
                        <td>${escapeHtml(subject)}</td>
                        <td><span class="badge ${getBadgeClass(round4)}">${escapeHtml(round4)}</span></td>
                        <td><span class="badge ${getBadgeClass(round5)}">${escapeHtml(round5)}</span></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
                recordCount.textContent = `${data.length} 条记录`;
            }

            function escapeHtml(str) {
                return String(str).replace(/[&<>"]/g, function(m) {
                    if (m === "&") return "&amp;";
                    if (m === "<") return "&lt;";
                    if (m === ">") return "&gt;";
                    if (m === '"') return "&quot;";
                    return m;
                });
            }

            function filterAndSearch() {
                let filtered = [...rawData];

                // 第五轮等级筛选
                if (currentGradeFilter !== "all") {
                    filtered = filtered.filter(row => row[4] === currentGradeFilter);
                }

                // 学科门类筛选
                if (currentCategory !== "all") {
                    filtered = filtered.filter(row => {
                        const subject = row[2];
                        const cat = subjectCategoryMap[subject] || "其他";
                        return cat === currentCategory;
                    });
                }

                // 省份筛选
                if (currentProvince !== "all") {
                    filtered = filtered.filter(row => row[0] === currentProvince);
                }

                // 搜索词（学校、专业、省份）
                if (currentSearch.trim() !== "") {
                    const term = currentSearch.trim().toLowerCase();
                    filtered = filtered.filter(row => 
                        row[0].toLowerCase().includes(term) ||
                        row[1].toLowerCase().includes(term) ||
                        row[2].toLowerCase().includes(term)
                    );
                }

                renderTable(filtered);
            }

            // 事件绑定
            searchBtn.addEventListener("click", () => {
                currentSearch = searchInput.value;
                filterAndSearch();
            });
            searchInput.addEventListener("keyup", (e) => {
                if (e.key === "Enter") {
                    currentSearch = searchInput.value;
                    filterAndSearch();
                }
            });

                    filterChips.forEach(c => c.classList.remove("active"));
                    chip.classList.add("active");
                    currentGradeFilter = chip.dataset.grade;
